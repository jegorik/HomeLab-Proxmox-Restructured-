---
# =============================================================================
# NPM Role - OpenResty Installation
# =============================================================================

# WORKAROUND: OpenResty GPG key (E52218E7087897DC6DEA6D6D97DB7443D5EDEB74)
# uses SHA1 binding signatures. Since 2026-02-01, Debian 13's Sequoia PGP (sqv)
# rejects SHA1. Override the policy until OpenResty publishes a new key.
# Upstream issue: https://github.com/openresty/openresty/issues/1072
# TODO: Remove this workaround once OpenResty updates their GPG key to SHA256+.
- name: Check if Sequoia PGP default config exists
  ansible.builtin.stat:
    path: /usr/share/apt/default-sequoia.config
  register: sequoia_stat

- name: Create Sequoia PGP policy override directory
  ansible.builtin.file:
    path: /etc/crypto-policies/back-ends
    state: directory
    mode: "0755"
  when: sequoia_stat.stat.exists

- name: Override Sequoia PGP SHA1 rejection date (OpenResty GPG workaround)
  ansible.builtin.copy:
    dest: /etc/crypto-policies/back-ends/apt-sequoia.config
    src: /usr/share/apt/default-sequoia.config
    remote_src: true
    force: false
    mode: "0644"
  when: sequoia_stat.stat.exists

- name: Extend SHA1 acceptance deadline to 2027-02-01
  ansible.builtin.replace:
    path: /etc/crypto-policies/back-ends/apt-sequoia.config
    regexp: '2026-02-01'
    replace: '2027-02-01'
  when: sequoia_stat.stat.exists

- name: Download OpenResty GPG key
  ansible.builtin.get_url:
    url: https://openresty.org/package/pubkey.gpg
    dest: /tmp/openresty.gpg.key
    mode: "0644"

- name: Dearmor OpenResty GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/trusted.gpg.d/openresty.gpg /tmp/openresty.gpg.key
    creates: /etc/apt/trusted.gpg.d/openresty.gpg

- name: Add OpenResty repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/openresty.sources
    content: |
      Types: deb
      URIs: http://openresty.org/package/debian/
      Suites: bookworm
      Components: openresty
      Signed-By: /etc/apt/trusted.gpg.d/openresty.gpg
    mode: "0644"

- name: Update apt cache after adding OpenResty repo
  ansible.builtin.apt:
    update_cache: true

- name: Install OpenResty
  ansible.builtin.apt:
    name: openresty
    state: present
