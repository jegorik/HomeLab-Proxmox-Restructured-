[defaults]
# Suppress deprecation warnings for INJECT_FACTS_AS_VARS
deprecation_warnings = False
inject_facts_as_vars = False

# Retry files
retry_files_enabled = False

# SSH settings
# host_key_checking is intentionally NOT disabled here.
# Pre-populate known_hosts before running: ssh-keyscan -H <host> >> ~/.ssh/known_hosts
# To bypass for a single ad-hoc run only: ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook ...
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[ssh_connection]
pipelining = True
